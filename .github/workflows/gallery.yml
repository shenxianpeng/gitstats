name: Gallery — Weekly Reports

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install GitStats
        run: |
          pip install --upgrade pip
          pip install -e .

      - name: Generate Reports
        env:
          FONTCONFIG_FILE: /dev/null
        run: |
          set -e
          github="https://github.com"

          git clone --depth 15000 "$github/torvalds/linux.git"        /tmp/linux
          git clone --depth 10000 "$github/python/cpython.git"        /tmp/cpython
          git clone --depth 10000 "$github/microsoft/vscode.git"      /tmp/vscode
          git clone --depth  8000 "$github/git/git.git"               /tmp/git
          git clone --depth  8000 "$github/nginx/nginx.git"           /tmp/nginx
          git clone --depth 10000 "$github/kubernetes/kubernetes.git" /tmp/kubernetes

          for repo in linux cpython vscode git nginx kubernetes; do
            python -m gitstats "/tmp/$repo" "gallery/$repo"
          done

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gallery
          destination_dir: gallery
          keep_files: true
