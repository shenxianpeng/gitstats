# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, Python version, and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    python: "3.12" # use 3.12 because 3.13 removed imghdr module, it will cause error
  commands:
    - pip install .[docs]
    # Build English or Chinese docs based on RTD language setting
    - >
      if [ "$READTHEDOCS_LANGUAGE" = "zh-cn" ]; then
        sphinx-build -b html docs/zh $READTHEDOCS_OUTPUT/html;
      else
        sphinx-build -b html docs/source $READTHEDOCS_OUTPUT/html;
      fi
